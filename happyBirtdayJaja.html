<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Happy Birthday Jaja</title>
    <style>
      body {
        background: linear-gradient(135deg, #ffccf2, #ffe6f9);
        font-family: "Comic Sans MS", cursive, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .scene {
        width: 450px;
        height: 320px;
        perspective: 1000px;
      }
      .card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s;
        cursor: pointer;
      }
      .card.is-flipped {
        transform: rotateY(180deg);
      }
      .card__face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 20px;
        box-shadow: 0 12px 25px rgba(255, 105, 180, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 25px;
        box-sizing: border-box;
      }
      .card__face--front {
        background: #fff0f6;
        color: #ff3399;
        font-size: 2.5em;
        font-weight: bold;
        animation: glow 2s infinite alternate;
      }
      @keyframes glow {
        from {
          text-shadow: 0 0 10px #ff99cc;
        }
        to {
          text-shadow: 0 0 25px #ff3399;
        }
      }
      .card__face--back {
        background: #ffe6f9;
        transform: rotateY(180deg);
        flex-direction: column;
        color: #cc0066;
        font-size: 1.1em;
        line-height: 1.5;
      }
      .message-container {
        max-height: 180px;
        overflow-y: auto;
        padding: 10px;
        border: 2px solid #ff99cc;
        border-radius: 10px;
        background: #fff0f6;
        text-align: left;
        font-size: 1em;
        width: 100%;
      }
      .cake {
        font-size: 3em;
        margin-top: 15px;
        transition: transform 0.5s ease;
        cursor: pointer;
      }
      .cake:hover {
        transform: scale(1.2) rotate(5deg);
      }
      .heart {
        font-size: 2em;
        color: #ff3399;
        animation: pulse 1.5s infinite;
        margin-top: 10px;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="card" id="birthdayCard">
        <div class="card__face card__face--front">
          🎉 Happy Birthday Jaja 🎉
        </div>
        <div class="card__face card__face--back">
          <div class="message-container" id="message"></div>
          <div class="cake" onclick="blowCandles()">🎂</div>
          <div class="heart">❤</div>
        </div>
      </div>
    </div>

    <script>
      const card = document.getElementById("birthdayCard");
      const messageBox = document.getElementById("message");
      const messageText = `My Dearest Jaja,

Happy Birthday to the most wonderful person I know.  
You have this rare gift of making the world brighter just by being yourself.  
Your kindness, laughter, and warmth inspire me every single day.  
You make me feel something truly special—like life is softer and more meaningful because of you.

May you see yourself today the way I see you: extraordinary, irreplaceable, and deeply cherished.  
You deserve all the happiness in the world, because you make mine so much better.`;

      let index = 0;
      let interval;

      card.addEventListener("click", () => {
        card.classList.toggle("is-flipped");
        if (card.classList.contains("is-flipped")) {
          typeMessage();
        } else {
          clearInterval(interval);
          messageBox.innerHTML = "";
        }
      });

      function typeMessage() {
        messageBox.innerHTML = "";
        index = 0;
        clearInterval(interval);
        interval = setInterval(() => {
          messageBox.innerHTML += messageText.charAt(index);
          messageBox.scrollTop = messageBox.scrollHeight;
          index++;
          if (index >= messageText.length) {
            clearInterval(interval);
          }
        }, 50);
      }

      function blowCandles() {
        alert("Make a wish, Jaja! 🎂✨");
      }
    </script>
  </body>
</html>
